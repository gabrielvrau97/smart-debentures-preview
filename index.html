<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Debêntures — Prévia</title>
<style>
  :root{
    --green:#0B5E2E; --green2:#0A4F27; --pos:#157A3C; --ink:#14181F;
    --muted:#69727C; --line:#E4E8ED; --bg:#F4F6F8; --card:#FFFFFF; --neg:#9A3412;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  body{background:#d8dee6;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 12px;color:var(--ink);}
  .titulo-pagina{margin-bottom:16px;text-align:center;color:#2a3038;}
  .titulo-pagina h1{font-size:18px;font-weight:700;}
  .titulo-pagina p{color:#5a6470;font-size:12px;margin-top:4px;}
  .num{font-variant-numeric:tabular-nums;}
  .phone{width:390px;max-width:100%;height:790px;background:var(--bg);border-radius:36px;border:10px solid #0c0f13;box-shadow:0 24px 50px rgba(0,0,0,.30);overflow:hidden;position:relative;display:flex;flex-direction:column;}
  .screen{flex:1;overflow-y:auto;padding-bottom:78px;}
  .hidden{display:none;}

  /* header institucional */
  .topbar{background:linear-gradient(180deg,var(--green),var(--green2));color:#fff;padding:34px 20px 18px;}
  .topbar .brand{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.8;}
  .topbar .row{display:flex;align-items:flex-end;margin-top:2px;}
  .topbar .titular{font-size:19px;font-weight:700;}
  .topbar .acts{margin-left:auto;display:flex;gap:16px;}
  .topbar .acts svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.6;opacity:.9;cursor:pointer;}

  .pad{padding:18px 20px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;}

  /* resumo principal */
  .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .hero{padding:18px;margin-top:-14px;}
  .hero .big{font-size:30px;font-weight:700;margin-top:6px;letter-spacing:-.5px;}
  .hero .delta{margin-top:4px;font-size:14px;font-weight:600;color:var(--pos);}
  .hero svg.chart{display:block;margin-top:14px;width:100%;height:64px;}
  .hero .dia{margin-top:8px;font-size:12px;color:var(--muted);}

  /* tabela tipo extrato */
  .sectit{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:22px 0 8px;}
  .tab-rows{overflow:hidden;}
  .trow{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line);}
  .trow:last-child{border-bottom:none;}
  .trow .k{color:#3a424c;font-size:14px;}
  .trow .v{font-weight:600;font-size:14px;}
  .trow.tot{background:#F7FAF8;}
  .trow.tot .k{font-weight:700;color:var(--ink);}
  .trow.tot .v{font-weight:800;color:var(--green);font-size:16px;}
  .v-pos{color:var(--pos);} .v-neg{color:var(--neg);} .v-muted{color:var(--muted);}

  /* tabs extrato */
  .tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:6px;}
  .tab{flex:1;text-align:center;padding:11px 4px;font-size:13px;color:var(--muted);font-weight:600;cursor:pointer;border-bottom:2px solid transparent;}
  .tab.on{color:var(--green);border-bottom-color:var(--green);}
  .ext{display:flex;align-items:center;justify-content:space-between;padding:13px 4px;border-bottom:1px solid var(--line);}
  .ext .ti{font-size:14px;font-weight:600;color:#2c333b;}
  .ext .su{font-size:11px;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;margin-top:2px;}
  .ext .val{font-weight:700;color:var(--pos);font-size:14px;}

  .btn{width:100%;border:1px solid var(--green);background:var(--green);color:#fff;padding:15px;border-radius:10px;font-size:14px;font-weight:600;letter-spacing:.3px;margin-top:22px;cursor:pointer;text-transform:uppercase;}

  /* carteira */
  .cabec{background:var(--green);color:#fff;padding:30px 20px 16px;display:flex;align-items:center;gap:12px;}
  .cabec svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8;cursor:pointer;}
  .cabec .t{font-size:18px;font-weight:700;}
  .deb{margin:0 20px 14px;}
  .deb:first-of-type{margin-top:16px;}
  .deb .head{display:flex;align-items:center;padding:14px 16px 8px;}
  .deb .nome{font-size:15px;font-weight:700;flex:1;}
  .tag{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--green);border:1px solid var(--green);border-radius:4px;padding:2px 6px;}
  .deb .aq{padding:0 16px;font-size:12px;color:var(--green);font-weight:600;letter-spacing:.3px;}
  .deb .rd{padding:2px 16px 10px;font-size:11px;color:var(--muted);}

  /* nav */
  .nav{position:absolute;bottom:0;left:0;right:0;height:64px;background:#fff;border-top:1px solid var(--line);display:flex;}
  .nav button{flex:1;border:none;background:none;color:var(--muted);font-size:11px;letter-spacing:.5px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;}
  .nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;}
  .nav button.on{color:var(--green);font-weight:700;}
</style>
</head>
<body>
  <div class="titulo-pagina">
    <h1>Smart Debêntures — Prévia institucional</h1>
    <p>Dados de exemplo. Use "Painel" e "Carteira" embaixo para navegar.</p>
  </div>

  <div class="phone">
    <!-- PAINEL -->
    <div class="screen" id="scr-painel">
      <div class="topbar">
        <div class="brand">Smart Debêntures</div>
        <div class="row">
          <div class="titular">Cleuda Bastos</div>
          <div class="acts">
            <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2 5.3"/><path d="M20 4v5h-5"/></svg>
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"/></svg>
          </div>
        </div>
      </div>

      <div class="pad">
        <div class="card hero">
          <div class="lbl">Patrimônio líquido</div>
          <div class="big num" id="h-liq">R$ 0,00</div>
          <div class="delta num" id="h-delta">+ R$ 0,00 · 0,00%</div>
          <svg class="chart" id="h-chart" viewBox="0 0 320 64" preserveAspectRatio="none"></svg>
          <div class="dia num" id="h-dia">Rendimento médio de R$ 0,00 por dia</div>
        </div>

        <div class="sectit">Resumo da carteira</div>
        <div class="card tab-rows" id="h-resumo"></div>

        <div class="sectit">Extrato de rendimentos</div>
        <div class="tabs">
          <div class="tab on" onclick="setModo('dia',this)">Dia</div>
          <div class="tab" onclick="setModo('mes',this)">Mês</div>
          <div class="tab" onclick="setModo('per',this)">Personalizado</div>
        </div>
        <div id="h-extrato"></div>

        <button class="btn" onclick="go('carteira')">Abrir carteira</button>
      </div>
    </div>

    <!-- CARTEIRA -->
    <div class="screen hidden" id="scr-carteira">
      <div class="cabec">
        <svg viewBox="0 0 24 24" onclick="go('painel')"><path d="M15 18l-6-6 6-6"/></svg>
        <div class="t">Carteira</div>
      </div>
      <div id="c-lista"></div>
    </div>

    <div class="nav">
      <button class="on" id="nav-painel" onclick="go('painel')">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Painel</button>
      <button id="nav-carteira" onclick="go('carteira')">
        <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M16 12h2"/></svg>Carteira</button>
    </div>
  </div>

<script>
const APORTES = [
  {nome:"Debênture Energia XPTO", aquisicao:"2026-01-01", valor:10000, taxa:1.1, isenta:true},
  {nome:"Debênture Banco Y",      aquisicao:"2026-02-15", valor:5000,  taxa:1.3, isenta:false},
];
const HOJE = new Date();
const BRL = n => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n);
const d0 = s => { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); };
const strip = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const dias = (a,b) => Math.floor((strip(b)-strip(a))/86400000);
function aliq(d){ if(d<=180)return .225; if(d<=360)return .20; if(d<=720)return .175; return .15; }
function saldoEm(a,ref){ const dd=dias(d0(a.aquisicao),ref); if(dd<0)return 0; const td=Math.pow(1+a.taxa/100,1/30)-1; return a.valor*Math.pow(1+td,dd); }
function saldoCarteira(ref){ return APORTES.reduce((s,a)=>s+saldoEm(a,ref),0); }
function rendDiaA(a){ const t=strip(HOJE); const am=new Date(t.getTime()+86400000); return saldoEm(a,am)-saldoEm(a,t); }
function calc(a){
  const dd=Math.max(0,dias(d0(a.aquisicao),HOJE));
  const td=Math.pow(1+a.taxa/100,1/30)-1;
  const saldo=a.valor*Math.pow(1+td,dd);
  const rb=saldo-a.valor, al=a.isenta?0:aliq(dd), ir=rb>0?rb*al:0, rl=rb-ir;
  return {a,dd,saldo,rb,al,ir,rl,liq:a.valor+rl,dia:rendDiaA(a)};
}
const RES = APORTES.map(calc).sort((x,y)=>y.liq-x.liq);
const T = RES.reduce((t,r)=>({apl:t.apl+r.a.valor,saldo:t.saldo+r.saldo,rb:t.rb+r.rb,ir:t.ir+r.ir,liq:t.liq+r.liq,rl:t.rl+r.rl,dia:t.dia+r.dia}),{apl:0,saldo:0,rb:0,ir:0,liq:0,rl:0,dia:0});

document.getElementById('h-liq').textContent=BRL(T.liq);
document.getElementById('h-delta').textContent=`+ ${BRL(T.rl)} · ${(T.rl/T.apl*100).toFixed(2)}%`;
document.getElementById('h-dia').textContent=`Rendimento médio de ${BRL(T.dia)} por dia`;

(function(){
  const menor = APORTES.map(a=>d0(a.aquisicao)).reduce((a,b)=>a<b?a:b);
  const total = Math.max(1,dias(menor,HOJE)), n=40, vals=[];
  for(let i=0;i<n;i++){ const dia=new Date(strip(menor).getTime()+Math.round(total*i/(n-1))*86400000); vals.push(saldoCarteira(dia)); }
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1,W=320,H=64;
  const pts=vals.map((v,i)=>[W*i/(n-1), H-((v-min)/rng)*H*0.82-H*0.09]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const fill=line+` L ${W} ${H} L 0 ${H} Z`;
  document.getElementById('h-chart').innerHTML=
    `<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
       <stop offset="0" stop-color="#0B5E2E" stop-opacity="0.14"/>
       <stop offset="1" stop-color="#0B5E2E" stop-opacity="0"/></linearGradient></defs>
     <path d="${fill}" fill="url(#g)"/>
     <path d="${line}" fill="none" stroke="#0B5E2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
})();

const row=(k,v,cls='')=>`<div class="trow"><span class="k">${k}</span><span class="v num ${cls}">${v}</span></div>`;
document.getElementById('h-resumo').innerHTML=
  row('Valor aplicado',BRL(T.apl))+
  row('Saldo bruto',BRL(T.saldo))+
  row('Rendimento bruto',BRL(T.rb),'v-pos')+
  row('Imposto de renda (resgate)',BRL(T.ir),'v-neg')+
  `<div class="trow tot"><span class="k">Rendimento líquido</span><span class="v num">${BRL(T.rl)}</span></div>`;

function rendPeriodo(ini,fim){ return APORTES.reduce((s,a)=>{ const aq=d0(a.aquisicao); const st=aq>ini?aq:ini; if(fim<st)return s; return s+saldoEm(a,fim)-saldoEm(a,st); },0); }
function extDia(){ const out=[]; const t=strip(HOJE); for(let i=0;i<12;i++){ const dia=new Date(t.getTime()-i*86400000); const r=rendPeriodo(new Date(dia.getTime()-86400000),dia); if(r>0.005){ const ds=dia.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); const dw=dia.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.',''); out.push([`${ds} · ${dw}`,r]); } } return out; }
function extMes(){ const out=[]; const menor=APORTES.map(a=>d0(a.aquisicao)).reduce((a,b)=>a<b?a:b); let y=menor.getFullYear(),m=menor.getMonth(); const ty=HOJE.getFullYear(),tm=HOJE.getMonth(); while(y<ty||(y===ty&&m<=tm)){ const ini=new Date(y,m,1); const prox=new Date(y,m+1,1); const fim=prox>strip(HOJE)?strip(HOJE):new Date(prox.getTime()-86400000); const r=rendPeriodo(new Date(ini.getTime()-86400000),fim); if(r>0.005){ out.push([ini.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),r]); } m++; if(m>11){m=0;y++;} } return out.reverse(); }
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
function renderExtrato(modo){
  let itens;
  if(modo==='per'){ const ini=new Date(strip(HOJE).getTime()-7*86400000); itens=[[`${ini.toLocaleDateString('pt-BR')} a ${HOJE.toLocaleDateString('pt-BR')}`,rendPeriodo(ini,strip(HOJE))]]; }
  else itens = modo==='dia'?extDia():extMes();
  document.getElementById('h-extrato').innerHTML = itens.map(([t,v])=>
    `<div class="ext"><div><div class="ti">${cap(t)}</div><div class="su">Rendimento bruto</div></div><div class="val num">+ ${BRL(v)}</div></div>`
  ).join('') || `<div class="ext"><div class="su">Sem rendimento no período.</div></div>`;
}
function setModo(m,el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); el.classList.add('on'); renderExtrato(m); }
renderExtrato('dia');

document.getElementById('c-lista').innerHTML = RES.map(r=>{
  const a=r.a, aqStr=d0(a.aquisicao).toLocaleDateString('pt-BR');
  const irLabel = a.isenta?'Imposto de renda':`Imposto de renda (${(r.al*100).toFixed(1)}%)`;
  const irVal = a.isenta?'Isento':BRL(r.ir);
  return `<div class="card deb">
    <div class="head"><div class="nome">${a.nome}</div>${a.isenta?'<span class="tag">Isenta IR</span>':''}</div>
    <div class="aq">Aquisição em ${aqStr}</div>
    <div class="rd num">Rendimento médio de ${BRL(r.dia)} por dia</div>
    <div class="tab-rows">
      ${row('Valor aplicado',BRL(a.valor))}
      ${row('Saldo bruto',BRL(r.saldo))}
      ${row('Rendimento bruto',BRL(r.rb),'v-pos')}
      ${row(irLabel,irVal,'v-neg')}
      <div class="trow tot"><span class="k">Rendimento líquido</span><span class="v num">${BRL(r.rl)}</span></div>
    </div>
  </div>`;
}).join('');

function go(tela){
  document.getElementById('scr-painel').classList.toggle('hidden',tela!=='painel');
  document.getElementById('scr-carteira').classList.toggle('hidden',tela!=='carteira');
  document.getElementById('nav-painel').classList.toggle('on',tela==='painel');
  document.getElementById('nav-carteira').classList.toggle('on',tela==='carteira');
}
</script>
</body>
</html>
